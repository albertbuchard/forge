name: ForgeCompanion
options:
  bundleIdPrefix: com.albertbuchard
schemes:
  ForgeCompanion:
    build:
      targets:
        ForgeCompanion: all
        ForgeScreenTimeReportExtension: [build]
    test:
      targets:
        - ForgeCompanionTests
targets:
  ForgeCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeCompanion/ForgeCompanion
        excludes:
          - Info.plist
          - ForgeCompanion.entitlements
      - ForgeCompanion/ScreenTimeShared
    dependencies:
      - target: ForgeScreenTimeReportExtension
      - sdk: FamilyControls.framework
      - sdk: DeviceActivity.framework
      - sdk: ManagedSettings.framework
      - sdk: _DeviceActivity_SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertbuchard.ForgeCompanion
        CODE_SIGN_ENTITLEMENTS: ForgeCompanion/ForgeCompanion/ForgeCompanion.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KZ65F7924F
    info:
      path: ForgeCompanion/Info.plist
      properties:
        CFBundleDisplayName: Forge Companion
        BGTaskSchedulerPermittedIdentifiers:
          - com.albertbuchard.ForgeCompanion.health-sync
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            100.100.100.100:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSCameraUsageDescription: Forge Companion uses the camera to scan the pairing QR code from Forge Settings.
        NSHealthShareUsageDescription: Forge Companion reads Health data to sync sleep, workouts, and recovery into Forge.
        NSHealthUpdateUsageDescription: Forge Companion may write reconciliation metadata in future milestones.
        NSLocalNetworkUsageDescription: Forge Companion scans your local network to find Forge runtimes during setup.
        NSMotionUsageDescription: Forge Companion uses motion activity to distinguish travel, walking, stationary periods, and movement context for truthful trip and stay capture.
        NSLocationWhenInUseUsageDescription: Forge Companion uses location to detect stays, trips, and meaningful places for reflective movement history in Forge.
        NSLocationAlwaysAndWhenInUseUsageDescription: Forge Companion uses background location to detect stays, trips, and stops so Forge can build a truthful movement timeline even when the app is not open.
        NSBonjourServices:
          - _forge._tcp
        LSApplicationQueriesSchemes:
          - tailscale
        UIBackgroundModes:
          - fetch
          - location
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  ForgeWatch Watch App:
    type: application.watchapp2
    platform: watchOS
    sources:
      - path: ForgeCompanion/ForgeWatch Watch App
        excludes:
          - ForgeWatch Watch App.entitlements
    dependencies:
      - target: ForgeWatchExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertbuchard.ForgeCompanion.watchkitapp
        CODE_SIGN_ENTITLEMENTS: ForgeCompanion/ForgeWatch Watch App/ForgeWatch Watch App.entitlements
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KZ65F7924F
  ForgeWatchExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: ForgeCompanion/ForgeWatch
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertbuchard.ForgeCompanion.watchkitapp.ForgeWatch
        CODE_SIGN_ENTITLEMENTS: ForgeCompanion/ForgeWatchExtension.entitlements
        INFOPLIST_FILE: ForgeCompanion/ForgeWatch/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KZ65F7924F
    info:
      path: ForgeCompanion/ForgeWatch/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
  ForgeScreenTimeReportExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeCompanion/ForgeScreenTimeReportExtension
        excludes:
          - Info.plist
          - ForgeScreenTimeReportExtension.entitlements
      - ForgeCompanion/ScreenTimeShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertbuchard.ForgeCompanion.ForgeScreenTimeReportExtension
        CODE_SIGN_ENTITLEMENTS: ForgeCompanion/ForgeScreenTimeReportExtension/ForgeScreenTimeReportExtension.entitlements
        INFOPLIST_FILE: ForgeCompanion/ForgeScreenTimeReportExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KZ65F7924F
    info:
      path: ForgeCompanion/ForgeScreenTimeReportExtension/Info.plist
      properties:
        CFBundleDisplayName: Screen Time Report
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivityui.report-extension
    dependencies:
      - sdk: FamilyControls.framework
      - sdk: DeviceActivity.framework
      - sdk: ManagedSettings.framework
      - sdk: _DeviceActivity_SwiftUI.framework
  ForgeCompanionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ForgeCompanion/ForgeCompanionTests
    dependencies:
      - target: ForgeCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertbuchard.ForgeCompanionTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KZ65F7924F

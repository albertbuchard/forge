name: OpenClaw Plugin

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/openclaw-plugin.yml"
      - "openclaw-plugin/**"
      - "openclaw.plugin.json"
      - "skills/forge-openclaw/**"
      - "src/openclaw/**"
      - "server/src/app.ts"
      - "server/src/app.test.ts"
      - "server/src/openapi.ts"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/openclaw-plugin.yml"
      - "openclaw-plugin/**"
      - "openclaw.plugin.json"
      - "skills/forge-openclaw/**"
      - "src/openclaw/**"
      - "server/src/app.ts"
      - "server/src/app.test.ts"
      - "server/src/openapi.ts"
      - "package.json"

jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm exec -- tsc --noEmit
      - run: npm exec -- tsc -p server/tsconfig.json --noEmit
      - run: npm exec -- vitest run src/openclaw/parity.test.ts src/openclaw/index.test.ts src/openclaw/api-client.test.ts src/openclaw/manifest.test.ts
      - run: npm run build
      - run: node --import tsx --test --test-concurrency=1 server/src/app.test.ts
      - run: npm run build:openclaw-plugin

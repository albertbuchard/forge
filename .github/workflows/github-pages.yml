name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "server/src/openapi.ts"
      - "scripts/export-openapi-docs.ts"
      - "openclaw-plugin/docs/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run docs:openapi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./openclaw-plugin/docs
      - id: deployment
        uses: actions/deploy-pages@v4

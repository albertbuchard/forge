name: Release Forge Companion iOS

on:
  push:
    tags:
      - "ios-testflight-v*"
      - "ios-app-store-v*"

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag points at main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit on origin/main." >&2
            exit 1
          }

      - name: Resolve release mode and version
        id: release_meta
        run: |
          case "${GITHUB_REF_NAME}" in
            ios-testflight-v*)
              echo "release_mode=testflight" >> "${GITHUB_OUTPUT}"
              echo "release_version=${GITHUB_REF_NAME#ios-testflight-v}" >> "${GITHUB_OUTPUT}"
              ;;
            ios-app-store-v*)
              echo "release_mode=app-store" >> "${GITHUB_OUTPUT}"
              echo "release_version=${GITHUB_REF_NAME#ios-app-store-v}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Unsupported tag pattern: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Verify iOS release credentials are configured
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.FORGE_IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.FORGE_IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.FORGE_IOS_KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILES_BASE64: ${{ secrets.FORGE_IOS_PROVISIONING_PROFILES_BASE64 }}
          FORGE_ASC_KEY_ID: ${{ secrets.FORGE_ASC_KEY_ID }}
          FORGE_ASC_ISSUER_ID: ${{ secrets.FORGE_ASC_ISSUER_ID }}
          FORGE_ASC_KEY_CONTENT_BASE64: ${{ secrets.FORGE_ASC_KEY_CONTENT_BASE64 }}
        run: |
          if [[ -n "${BUILD_CERTIFICATE_BASE64}" || -n "${P12_PASSWORD}" || -n "${KEYCHAIN_PASSWORD}" || -n "${PROVISIONING_PROFILES_BASE64}" ]]; then
            [[ -n "${BUILD_CERTIFICATE_BASE64}" ]] || {
              echo "Missing FORGE_IOS_BUILD_CERTIFICATE_BASE64 in the Forge repo secrets." >&2
              exit 1
            }
            [[ -n "${P12_PASSWORD}" ]] || {
              echo "Missing FORGE_IOS_P12_PASSWORD in the Forge repo secrets." >&2
              exit 1
            }
            [[ -n "${KEYCHAIN_PASSWORD}" ]] || {
              echo "Missing FORGE_IOS_KEYCHAIN_PASSWORD in the Forge repo secrets." >&2
              exit 1
            }
            [[ -n "${PROVISIONING_PROFILES_BASE64}" ]] || {
              echo "Missing FORGE_IOS_PROVISIONING_PROFILES_BASE64 in the Forge repo secrets." >&2
              exit 1
            }
            exit 0
          fi

          [[ -n "${FORGE_ASC_KEY_ID}" ]] || {
            echo "Missing FORGE_ASC_KEY_ID in the Forge repo secrets." >&2
            exit 1
          }
          [[ -n "${FORGE_ASC_ISSUER_ID}" ]] || {
            echo "Missing FORGE_ASC_ISSUER_ID in the Forge repo secrets." >&2
            exit 1
          }
          [[ -n "${FORGE_ASC_KEY_CONTENT_BASE64}" ]] || {
            echo "Missing FORGE_ASC_KEY_CONTENT_BASE64 in the Forge repo secrets." >&2
            exit 1
          }

      - name: Install signing certificate and provisioning profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.FORGE_IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.FORGE_IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.FORGE_IOS_KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILES_BASE64: ${{ secrets.FORGE_IOS_PROVISIONING_PROFILES_BASE64 }}
        run: |
          echo "FORGE_IOS_SKIP_FASTLANE_SETUP_CI=1" >> "${GITHUB_ENV}"

          CERTIFICATE_PATH="${RUNNER_TEMP}/forge-ios-build-certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/forge-ios-signing.keychain-db"

          if [[ -z "${BUILD_CERTIFICATE_BASE64}" ]]; then
            echo "No signing certificate secret configured. Using App Store Connect authentication for Xcode-managed signing."
            exit 0
          fi

          echo -n "${BUILD_CERTIFICATE_BASE64}" | base64 --decode -o "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}"
          echo "FORGE_IOS_SIGNING_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "FORGE_IOS_SIGNING_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "${GITHUB_ENV}"
          if [[ -n "${PROVISIONING_PROFILES_BASE64}" ]]; then
            mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
            profile_index=0
            while IFS= read -r encoded_profile; do
              [[ -n "${encoded_profile}" ]] || continue
              profile_path="${RUNNER_TEMP}/forge-profile-${profile_index}.mobileprovision"
              echo -n "${encoded_profile}" | base64 --decode -o "${profile_path}"
              cp "${profile_path}" "${HOME}/Library/MobileDevice/Provisioning Profiles/"
              profile_index=$((profile_index + 1))
            done <<< "${PROVISIONING_PROFILES_BASE64}"
          fi

          echo "FORGE_IOS_PROVISIONING_PROFILE_DIR=${HOME}/Library/MobileDevice/Provisioning Profiles" >> "${GITHUB_ENV}"

      - name: Write release environment file
        env:
          FORGE_IOS_RELEASE_ENV: ${{ secrets.FORGE_IOS_RELEASE_ENV }}
          FORGE_IOS_RELEASE_ENV_BASE64: ${{ secrets.FORGE_IOS_RELEASE_ENV_BASE64 }}
          FORGE_ASC_KEY_ID: ${{ secrets.FORGE_ASC_KEY_ID }}
          FORGE_ASC_ISSUER_ID: ${{ secrets.FORGE_ASC_ISSUER_ID }}
          FORGE_ASC_KEY_CONTENT_BASE64: ${{ secrets.FORGE_ASC_KEY_CONTENT_BASE64 }}
          FORGE_APPLE_TEAM_ID: ${{ secrets.FORGE_APPLE_TEAM_ID }}
        run: |
          ./ios-companion/scripts/write-release-env.sh ios-companion/.release.env --require-asc-auth

      - name: Verify release config version matches tag
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          CONFIG_VERSION="$(
            sed -n 's/^[[:space:]]*marketing: "\(.*\)"/\1/p' ios-companion/release/release.yml | head -n 1
          )"
          [[ -n "${CONFIG_VERSION}" ]] || {
            echo "Could not read release.version.marketing from ios-companion/release/release.yml." >&2
            exit 1
          }
          [[ "${CONFIG_VERSION}" == "${RELEASE_VERSION}" ]] || {
            echo "Tag version ${RELEASE_VERSION} does not match ios-companion/release/release.yml marketing version ${CONFIG_VERSION}." >&2
            exit 1
          }

      - name: Capture App Store media
        run: npm run media:ios-companion:screenshots

      - name: Publish iOS release
        env:
          FORGE_IOS_SKIP_REPO_RELEASE_CHECKS: "1"
          FORGE_IOS_SKIP_FASTLANE_SETUP_CI: "1"
          RELEASE_MODE: ${{ steps.release_meta.outputs.release_mode }}
        run: ./ios-companion/scripts/publish-forge-companion.sh "${RELEASE_MODE}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-ios-release-artifacts
          path: ios-companion/.artifacts/releases/**
          if-no-files-found: error

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-ios-screenshots
          path: ios-companion/fastlane/screenshots/en-US/iphone-65/*.png
          if-no-files-found: error

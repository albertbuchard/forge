name: Release Forge OpenClaw Plugin

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-openclaw-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag points at main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tags must point to a commit on origin/main." >&2
            exit 1
          }

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Publish release from tag
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          FORGE_RELEASE_MODE=publish-from-tag \
            ./scripts/release-forge-openclaw-plugin.sh "${RELEASE_VERSION#v}"
